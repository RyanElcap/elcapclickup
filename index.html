<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certas Summary</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .card { box-shadow: 0 4px 20px -2px rgb(0 0 0 / 0.08); }
  </style>
</head>
<body class="bg-gray-50 p-6">
  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">

    <!-- Welcome card (same as before) -->
    <div class="card bg-white rounded-3xl p-8">
      <h2 class="text-2xl font-semibold mb-6">Welcome!</h2>
      <div class="flex items-center justify-center h-40">
        <img id="logo" src="https://your-certas-logo-url-here" alt="Certas Energy" class="max-h-24">
      </div>
    </div>

    <!-- Summary card (same) -->
    <div class="card bg-white rounded-3xl p-8">
      <h2 class="text-2xl font-semibold mb-6">Summary</h2>
      <div class="space-y-4 text-lg">
        <div class="flex justify-between"><span>30 BAU hours monthly</span></div>
        <div class="flex justify-between"><span>12 hours monthly for patching</span></div>
        <div class="flex justify-between items-center">
          <span>Rollover from <span id="prev-month">February</span>:</span>
          <input id="rollover-input" type="text" value="27.5" class="w-20 text-right bg-gray-100 rounded px-3 py-1 text-lg font-medium">
          <span class="text-sm text-gray-500">hours</span>
        </div>
      </div>
      <div class="mt-8 pt-8 border-t border-dashed">
        <div class="text-4xl font-bold text-center text-indigo-700" id="total-available">69 Hours 30 Mins</div>
        <div class="text-center text-sm text-gray-500 mt-1">Total for <span id="current-month">March</span></div>
      </div>
      <div class="mt-6 text-center">
        <span class="text-2xl font-semibold text-green-600" id="hours-remaining">43 Hours 30 Mins</span>
        <span class="block text-xs text-gray-500">remaining this month</span>
      </div>
    </div>

    <!-- Time tracked card -->
    <div class="card bg-white rounded-3xl p-8 flex flex-col">
      <h2 class="text-2xl font-semibold mb-6">Time tracked this month</h2>
      <div class="flex-1 flex flex-col justify-center items-center">
        <div class="text-sm text-gray-500 flex items-center gap-2">
          <span class="text-3xl">⏱</span> Monthly Retainer
        </div>
        <div id="tracked-time" class="text-6xl font-mono font-bold text-indigo-700 mt-6">00:00:00</div>
        <div class="text-xs text-gray-400 mt-1">TRACKED</div>
      </div>
      <div class="text-center text-xs text-gray-400 mt-auto pt-6">
        Last updated: <span id="last-updated">just now</span>
      </div>
    </div>
  </div>

  <script>
    const API_TOKEN = "pk_XXXXXXXXXXXXXXXXXXXXXXXXXXXXXX"; // ← keep your token here (not used anymore)
    let rollover = parseFloat(localStorage.getItem('rollover') || "27.5");

    document.getElementById('rollover-input').value = rollover;
    document.getElementById('rollover-input').addEventListener('input', (e) => {
      rollover = parseFloat(e.target.value) || 0;
      localStorage.setItem('rollover', rollover);
      updateSummary();
    });

    async function fetchTrackedHours() {
      try {
        const res = await fetch('/api/get-time');
        const data = await res.json();
        return data.totalMs || 0;
      } catch(e) {
        console.error(e);
        return 0;
      }
    }

    function msToHHMMSS(ms) {
      const totalSeconds = Math.floor(ms / 1000);
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    }

    function updateSummary() {
      const totalAvailableHours = 30 + 12 + rollover;
      const totalAvailableMs = totalAvailableHours * 3600000;
      const totalHours = Math.floor(totalAvailableHours);
      const totalMins = Math.round((totalAvailableHours - totalHours) * 60);
      document.getElementById('total-available').textContent = `${totalHours} Hours ${totalMins} Mins`;

      const remHours = Math.floor(totalAvailableMs / 3600000);
      const remMins = Math.round(((totalAvailableMs % 3600000) / 60000));
      document.getElementById('hours-remaining').textContent = `${remHours} Hours ${remMins} Mins`;
    }

    async function refresh() {
      const trackedMs = await fetchTrackedHours();
      document.getElementById('tracked-time').textContent = msToHHMMSS(trackedMs);

      const now = new Date();
      document.getElementById('last-updated').textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

      const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
      document.getElementById('current-month').textContent = months[now.getMonth()];
      document.getElementById('prev-month').textContent = months[(now.getMonth() + 11) % 12];

      updateSummary();
    }

    refresh();
    setInterval(refresh, 60000);
  </script>
</body>
</html>
